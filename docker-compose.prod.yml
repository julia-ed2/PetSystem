version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: petsystem-mysql-prod
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - mysql_data_prod:/var/lib/mysql
    networks:
      - petsystem_network_prod
    restart: always
    command:
      - --default-authentication-plugin=mysql_native_password
      - --sql-mode=
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  backend:
    build:
      context: ./petSystemPy
      dockerfile: Dockerfile
      target: runtime
    container_name: petsystem-backend-prod
    environment:
      FLASK_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      SERVER_PORT: 5000
    expose:
      - "5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - petsystem_network_prod
    restart: always
    command: gunicorn --config gunicorn_config.py wsgi:app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      timeout: 10s
      retries: 5
      interval: 10s

  frontend:
    build:
      context: ./petSystemRe
      dockerfile: Dockerfile
    container_name: petsystem-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - petsystem_network_prod
    restart: always
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /usr/share/nginx/html/index.html"]
      timeout: 10s
      retries: 5
      interval: 10s

volumes:
  mysql_data_prod:
    driver: local

networks:
  petsystem_network_prod:
    driver: bridge
