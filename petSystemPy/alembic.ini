# Alembic Configuration File
# sqlalchemy.url is set via environment variable

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to datetime.tz module. If left blank
# the migration files will use UTC without any timezone offset.
# sqlalchemy.timezone =

# max length of characters to apply to the
# "slug" field
# When set to a positive integer, the upper half of the
# limit (half the length) is reserved for autogenerated
# migration descriptions, and the lower half is reserved for
# an explicit user-defined description
# sqlalchemy.max_identifier_length = 128

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sqlalchemy.allow_zero_in_numeric = false

# Logging configuration
[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
